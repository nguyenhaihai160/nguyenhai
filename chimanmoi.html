<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flappy Rock HD - Có Nhạc Nền</title>
  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      touch-action: none;
    }
    h1 {
      color: white;
      text-shadow: 0 0 15px black;
      margin: 10px 0 6px;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
    }
    #score-container {
      color: white;
      font-size: clamp(1.1rem, 4.5vw, 1.6rem);
      margin-bottom: 8px;
    }
    #game-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 4px solid white;
      border-radius: 15px;
      box-shadow: 0 0 40px rgba(0,0,0,0.7);
      max-width: 98%;
      max-height: 92%;
      touch-action: none;
    }
  </style>
</head>
<body>
  <h1>🪨 FLAPPY ROCK HD</h1>
  <div id="score-container">Score: <span id="score">0</span></div>
  <div id="game-container">
    <canvas id="game"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // ── RESPONSIVE SETUP ───────────────────────────────────────────────
    let gameWidth = 360;
    let gameHeight = 500;
    let scale = 1;

    function resizeCanvas() {
      const maxW = window.innerWidth * 0.96;
      const maxH = window.innerHeight * 0.84; // chừa chỗ header + score

      if (maxW / maxH > gameWidth / gameHeight) {
        scale = maxH / gameHeight;
      } else {
        scale = maxW / gameWidth;
      }

      canvas.style.width  = (gameWidth  * scale) + "px";
      canvas.style.height = (gameHeight * scale) + "px";

      canvas.width  = gameWidth  * scale * window.devicePixelRatio;
      canvas.height = gameHeight * scale * window.devicePixelRatio;

      ctx.scale(scale * window.devicePixelRatio, scale * window.devicePixelRatio);
    }

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', resizeCanvas);
    resizeCanvas();

    // ── GAME VARIABLES ─────────────────────────────────────────────────
    let playerX = 120, playerY = 250, velocity = 0;
    let gravity = 0.55, lift = -13.5;
    let running = false, gameOverFlag = false;

    let score = 0;
    let obstacles = [];
    let obstacleSpeed = 2.2;
    let gapSize = 245;

    let spawnRate = 2400;
    let difficultyLevel = 0;
    let lastDifficultyTime = 0;
    let lastSpawnTime = 0;

    let particles = [];
    let cloudX = 0, groundX = 0;

    let musicTimeout = null;

    // ── BACKGROUND MUSIC ───────────────────────────────────────────────
    function playBackgroundMusic() {
      if (musicTimeout) clearTimeout(musicTimeout);
      let index = 0;
      const melody = [261.6,329.6,392.0,523.3,659.3,523.3,392.0,329.6,392.0,440.0,523.3,659.3,784.0,659.3,523.3,392.0];
      function loop() {
        if (!running) return;
        let freq = melody[index % melody.length];
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = "triangle";
        osc.frequency.value = freq;
        gain.gain.value = 0.085;
        let filter = audioCtx.createBiquadFilter();
        filter.type = "lowpass"; filter.frequency.value = 1800;
        osc.connect(filter).connect(gain).connect(audioCtx.destination);
        osc.start();
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.28);
        osc.stop(audioCtx.currentTime + 0.28);
        index++;
        musicTimeout = setTimeout(loop, 210);
      }
      loop();
    }

    function stopBackgroundMusic() {
      if (musicTimeout) {
        clearTimeout(musicTimeout);
        musicTimeout = null;
      }
    }

    // ── SOUND EFFECTS ──────────────────────────────────────────────────
    function playFlap() {
      let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
      osc.type = "sine"; osc.frequency.setValueAtTime(680, audioCtx.currentTime);
      gain.gain.value = 0.4; osc.connect(gain).connect(audioCtx.destination);
      osc.start(); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
      osc.stop(audioCtx.currentTime + 0.12);
    }

    function playScore() {
      let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
      osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
      osc.connect(gain).connect(audioCtx.destination);
      gain.gain.value = 0.3; osc.start();
      osc.frequency.linearRampToValueAtTime(1800, audioCtx.currentTime + 0.25);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      osc.stop(audioCtx.currentTime + 0.3);
    }

    function playHit() {
      let noise = audioCtx.createBufferSource();
      let buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.6, audioCtx.sampleRate);
      let data = buffer.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i] = Math.random()*2-1;
      noise.buffer = buffer;
      let filter = audioCtx.createBiquadFilter(); filter.type = "lowpass"; filter.frequency.value = 800;
      let gain = audioCtx.createGain();
      noise.connect(filter).connect(gain).connect(audioCtx.destination);
      gain.gain.value = 0.6; gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
      noise.start();
    }

    function playDie() {
      let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.connect(gain).connect(audioCtx.destination);
      gain.gain.value = 0.5; osc.start();
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2);
      osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 1.2);
      osc.stop(audioCtx.currentTime + 1.2);
    }

    function playLevelUp() {
      let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
      osc.type = "sine"; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.connect(gain).connect(audioCtx.destination);
      gain.gain.value = 0.35; osc.start();
      osc.frequency.linearRampToValueAtTime(1320, audioCtx.currentTime + 0.6);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.7);
      osc.stop(audioCtx.currentTime + 0.7);
    }

    // ── DRAW FUNCTIONS ─────────────────────────────────────────────────
    function drawBackground() {
      let grad = ctx.createLinearGradient(0,0,0,420);
      grad.addColorStop(0,"#5EB6FF"); grad.addColorStop(1,"#A1E2FF");
      ctx.fillStyle = grad; ctx.fillRect(0,0,gameWidth,gameHeight);

      ctx.fillStyle = "#FFEE55"; ctx.beginPath(); ctx.arc(280,75,28,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "rgba(255,230,100,0.3)"; ctx.beginPath(); ctx.arc(280,75,40,0,Math.PI*2); ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.95)";
      for(let i=0;i<6;i++){
        let x = cloudX + i*95;
        ctx.beginPath(); ctx.ellipse(x+30,70,35,22,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x+15,55,25,20,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x+50,58,28,19,0,0,Math.PI*2); ctx.fill();
      }
      cloudX -= 0.25; if(cloudX < -150) cloudX = 0;

      ctx.fillStyle = "#5A7A9E"; ctx.beginPath(); ctx.moveTo(0,380); ctx.lineTo(90,220); ctx.lineTo(220,380); ctx.fill();
      ctx.fillStyle = "#4A6A8A"; ctx.beginPath(); ctx.moveTo(150,380); ctx.lineTo(270,190); ctx.lineTo(400,380); ctx.fill();

      ctx.fillStyle = "#4CAF50"; ctx.fillRect(groundX,420,gameWidth,80); ctx.fillRect(groundX+gameWidth,420,gameWidth,80);
      ctx.fillStyle = "#3D9E00"; for(let i=0;i<36;i++) ctx.fillRect(groundX + i*20 + 5, 415, 6, 12);
      groundX -= 2.2; if(groundX <= -gameWidth) groundX = 0;
    }

    function drawBird() {
      let angle = velocity * 0.06;
      ctx.save();
      ctx.translate(playerX, playerY);
      ctx.rotate(angle);
      let rockGrad = ctx.createRadialGradient(-8,-10,5, 8,10,22);
      rockGrad.addColorStop(0,"#E6B88A"); rockGrad.addColorStop(1,"#8B5A2B");
      ctx.fillStyle = rockGrad;
      ctx.beginPath(); ctx.ellipse(0,0,22,19,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = "#5C3A1F"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-12,-8); ctx.lineTo(-5,12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(10,-10); ctx.lineTo(6,8); ctx.stroke();
      ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.arc(8,-6,6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "#222"; ctx.beginPath(); ctx.arc(10,-6,3.5,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    function spawnParticle() {
      particles.push({x:playerX-5,y:playerY+5,vx:Math.random()*3-2,vy:Math.random()*2.5-1,life:22,size:Math.random()*4+3});
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.fillStyle = `hsl(${30+Math.random()*40},100%,65%)`;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
        p.x += p.vx; p.y += p.vy; p.life--; p.size *= 0.97;
      });
      particles = particles.filter(p => p.life > 0);
    }

    function drawObstacles() {
      obstacles.forEach(o => {
        o.x -= o.speed;
        ctx.fillStyle = "#666"; ctx.fillRect(o.x,0,o.width,o.gapY-gapSize/2);
        ctx.fillStyle = "#555"; ctx.fillRect(o.x-6,o.gapY-gapSize/2-35,o.width+12,38);
        ctx.strokeStyle = "#444"; ctx.lineWidth = 4; ctx.strokeRect(o.x,0,o.width,o.gapY-gapSize/2);

        ctx.fillStyle = "#666"; ctx.fillRect(o.x,o.gapY+gapSize/2,o.width,gameHeight);
        ctx.fillStyle = "#555"; ctx.fillRect(o.x-6,o.gapY+gapSize/2,o.width+12,38);
        ctx.strokeRect(o.x,o.gapY+gapSize/2,o.width,gameHeight);
      });
    }

    // ── GAME LOGIC ─────────────────────────────────────────────────────
    function checkCollision() {
      if (playerY < 25 || playerY > gameHeight - 25) {
        playHit(); playDie(); running = false; gameOverFlag = true; return;
      }
      obstacles.forEach(o => {
        if (playerX + 18 > o.x && playerX - 18 < o.x + o.width) {
          if (playerY < o.gapY - gapSize/2 + 10 || playerY > o.gapY + gapSize/2 - 10) {
            playHit(); playDie(); running = false; gameOverFlag = true;
          }
        }
      });
    }

    function updateScore() {
      obstacles.forEach(o => {
        if (!o.scored && o.x + o.width < playerX) {
          o.scored = true;
          score++;
          document.getElementById("score").innerText = score;
          playScore();
        }
      });
    }

    function spawnObstacle() {
      obstacles.push({
        x: gameWidth,
        gapY: 130 + Math.random() * 190,
        width: 78,
        speed: obstacleSpeed,
        scored: false
      });
    }

    // ── GAME LOOP ──────────────────────────────────────────────────────
    function update() {
      ctx.clearRect(0, 0, gameWidth, gameHeight);
      drawBackground();
      drawObstacles();
      drawParticles();

      if (running) {
        velocity += gravity;
        playerY += velocity;

        if (playerY < 25) { playerY = 25; velocity = 0; }
        if (playerY > gameHeight - 25) { playerY = gameHeight - 25; velocity = 0; }

        if (Date.now() - lastSpawnTime > spawnRate) {
          spawnObstacle();
          lastSpawnTime = Date.now();
        }

        if (Date.now() - lastDifficultyTime > 10000) {
          difficultyLevel++;
          obstacleSpeed += 0.22;
          spawnRate = Math.max(1350, spawnRate - 160);
          gapSize = Math.max(155, gapSize - 9);
          lastDifficultyTime = Date.now();
          playLevelUp();
        }

        spawnParticle();
        drawBird();
        checkCollision();
        updateScore();

        ctx.fillStyle = "white";
        ctx.font = "bold 18px Arial";
        ctx.fillText("Level " + difficultyLevel, 10, 35);

        obstacles = obstacles.filter(o => o.x > -90);

        requestAnimationFrame(update);
      } else if (gameOverFlag) {
        stopBackgroundMusic();
        drawBird();
        ctx.fillStyle = "rgba(0,0,0,0.65)";
        ctx.fillRect(0,0,gameWidth,gameHeight);
        ctx.fillStyle = "white";
        ctx.font = "bold 34px Arial";
        ctx.fillText("GAME OVER", 48, 190);
        ctx.font = "22px Arial";
        ctx.fillText("Điểm: " + score, 125, 235);
        ctx.fillText("Level cuối: " + difficultyLevel, 105, 265);
        ctx.fillText("Chạm để chơi lại", 55, 300);
      } else {
        drawBird();
      }
    }

    // ── START / RESTART ────────────────────────────────────────────────
    function startGame() {
      score = 0;
      velocity = 0;
      playerY = 250;
      obstacles = [];
      particles = [];
      obstacleSpeed = 2.2;
      gapSize = 245;
      spawnRate = 2400;
      difficultyLevel = 0;
      lastDifficultyTime = Date.now();
      lastSpawnTime = Date.now();
      document.getElementById("score").innerText = "0";

      spawnObstacle();
      running = true;
      gameOverFlag = false;
      playBackgroundMusic();
      update();
    }

    // ── CONTROLS ───────────────────────────────────────────────────────
    canvas.addEventListener("touchstart", e => {
      e.preventDefault();
      if (!running && gameOverFlag) {
        startGame();
        return;
      }
      if (running) {
        velocity = lift;
        playFlap();
      }
    });

    canvas.addEventListener("mousedown", () => {
      if (!running && gameOverFlag) {
        startGame();
        return;
      }
      if (running) {
        velocity = lift;
        playFlap();
      }
    });

    // Bắt đầu game lần đầu
    startGame();
  </script>
</body>
</html>
