<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Flappy Rock HD - PWA Fullscreen</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#87CEEB">

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://via.placeholder.com/192?text=Rock"> <!-- Thay bằng icon thật nếu có -->

<style>
body{margin:0;background:#000;font-family:Arial;text-align:center;overflow:hidden;height:100vh;}
h1{color:white;text-shadow:0 0 15px black;margin:10px 0;}
#game{border:0;box-shadow:0 0 40px rgba(0,0,0,0.6);}
#score{color:white;font-size:24px;}
#splash{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);color:white;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:100;font-size:28px;cursor:pointer;}
#install-prompt{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ffcc00;padding:10px 20px;border-radius:10px;color:black;font-weight:bold;z-index:90;display:none;}
canvas{display:block;}
</style>
</head>
<body>
<div id="splash">Chạm màn hình để bắt đầu<br>(Unlock âm thanh & fullscreen)</div>
<h1>🪨 FLAPPY ROCK HD</h1>
<div>Score: <span id="score">0</span></div>
<canvas id="game"></canvas>
<div id="install-prompt">Thêm vào màn hình chính để chơi offline!</div>

<script>
// === PWA: Service Worker ===
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
            console.log('Service Worker registered');
        }).catch(err => console.log('SW error:', err));
    });
}

// === AUDIO UNLOCK & SPLASH ===
const splash = document.getElementById('splash');
let audioUnlocked = false;
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

splash.addEventListener('touchstart', unlockAudio, {once: true});
splash.addEventListener('click', unlockAudio, {once: true});

function unlockAudio() {
    if (audioCtx.state === 'suspended') {
        audioCtx.resume().then(() => {
            console.log('Audio unlocked');
            audioUnlocked = true;
            splash.style.display = 'none';
            startGame(); // Bắt đầu game sau khi unlock
        });
    } else {
        splash.style.display = 'none';
        startGame();
    }
}

// === CANVAS & GAME ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// GAME VARIABLES (giữ nguyên từ code cũ, chỉ thêm resize)
let playerX = 120, playerY = 250, velocity = 0;
let gravity = 0.55, lift = -13.5;
let running = false, gameOverFlag = false;
let score = 0;
let obstacles = [];
let obstacleSpeed = 2.2;
let gapSize = 245;
let spawnRate = 2400;
let difficultyLevel = 0;
let lastDifficultyTime = 0;
let lastSpawnTime = 0;
let particles = [];
let cloudX = 0, groundX = 0;

// Resize canvas để fit màn hình, giữ tỷ lệ
const GAME_WIDTH = 360;
const GAME_HEIGHT = 500;

function resizeCanvas() {
    const aspect = GAME_WIDTH / GAME_HEIGHT;
    let w = window.innerWidth;
    let h = window.innerHeight;

    if (w / h > aspect) {
        // Màn hình rộng hơn → fit height
        canvas.height = h;
        canvas.width = h * aspect;
    } else {
        // Màn hình cao hơn → fit width
        canvas.width = w;
        canvas.height = w / aspect;
    }

    // Scale nội dung game
    const scale = canvas.width / GAME_WIDTH;
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas(); // Gọi lần đầu

// Các hàm drawBackground, drawBird, spawnParticle, drawParticles, drawObstacles, checkCollision, updateScore, spawnObstacle, playFlap/playScore/... giữ nguyên từ code cũ của bạn
// (Dán toàn bộ phần script game cũ vào đây, chỉ thay đổi update() để dùng resizeCanvas nếu cần)
// Ví dụ ngắn gọn (bạn copy phần còn lại từ code trước):

function drawBackground() { /* code cũ */ }
function drawBird() { /* code cũ */ }
/* ... các hàm khác ... */

function update() {
    ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT); // Clear theo logical size
    drawBackground();
    drawObstacles();
    drawParticles();

    if (running) {
        velocity += gravity;
        playerY += velocity;
        if (playerY < 25) { playerY = 25; velocity = 0; }
        if (playerY > 475) { playerY = 475; velocity = 0; }

        if (Date.now() - lastSpawnTime > spawnRate) {
            spawnObstacle();
            lastSpawnTime = Date.now();
        }
        if (Date.now() - lastDifficultyTime > 10000) {
            difficultyLevel++;
            obstacleSpeed += 0.22;
            spawnRate = Math.max(1350, spawnRate - 160);
            gapSize = Math.max(155, gapSize - 9);
            lastDifficultyTime = Date.now();
            playLevelUp();
        }

        spawnParticle();
        drawBird();
        checkCollision();
        updateScore();

        ctx.fillStyle = "white"; ctx.font = "bold 18px Arial"; ctx.fillText("Level " + difficultyLevel, 10, 35);

        obstacles = obstacles.filter(o => o.x > -90);
        requestAnimationFrame(update);
    } else if (gameOverFlag) {
        stopBackgroundMusic();
        drawBird();
        ctx.fillStyle = "rgba(0,0,0,0.65)";
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        ctx.fillStyle = "white";
        ctx.font = "bold 34px Arial"; ctx.fillText("GAME OVER", 48, 190);
        ctx.font = "22px Arial"; ctx.fillText("Điểm: " + score, 125, 235);
        ctx.fillText("Level cuối: " + difficultyLevel, 105, 265);
        ctx.fillText("Chạm để chơi lại", 55, 300);
    } else {
        drawBird();
    }
}

// Start game sau unlock
function startGame() {
    // Reset variables...
    score = 0; velocity = 0; playerY = 250;
    obstacles = []; particles = [];
    obstacleSpeed = 2.2; gapSize = 245;
    spawnRate = 2400; difficultyLevel = 0;
    lastDifficultyTime = Date.now(); lastSpawnTime = Date.now();
    document.getElementById("score").innerText = "0";

    spawnObstacle();
    running = true; gameOverFlag = false;
    playBackgroundMusic();
    resizeCanvas(); // Đảm bảo fit
    update();
}

// Control (touch/mouse) - đã có từ code cũ
canvas.addEventListener("touchstart", e => { e.preventDefault(); if(!running && gameOverFlag){startGame(); return;} if(running){velocity=lift; playFlap();} });
canvas.addEventListener("mousedown", () => { if(!running && gameOverFlag){startGame(); return;} if(running){velocity=lift; playFlap();} });

// PWA Install Prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-prompt').style.display = 'block';
});

document.getElementById('install-prompt').addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            console.log('User accepted install');
        }
        deferredPrompt = null;
        document.getElementById('install-prompt').style.display = 'none';
    }
});

// Bắt đầu với splash (audio unlock)
</script>
</body>
</html>
