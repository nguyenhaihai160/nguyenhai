<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flappy Rock HD - Có Nhạc Nền</title>
  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      touch-action: none;
    }
    h1 {
      color: white;
      text-shadow: 0 0 15px black;
      margin: 10px 0 6px;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
    }
    #score-container {
      color: white;
      font-size: clamp(1.1rem, 4.5vw, 1.6rem);
      margin-bottom: 8px;
    }
    #game-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 4px solid white;
      border-radius: 15px;
      box-shadow: 0 0 40px rgba(0,0,0,0.7);
      max-width: 98%;
      max-height: 92%;
      touch-action: none;
    }
  </style>
</head>
<body>
  <h1>🪨 FLAPPY ROCK HD</h1>
  <div id="score-container">Score: <span id="score">0</span></div>
  <div id="game-container">
    <canvas id="game"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // ── RESPONSIVE SETUP ───────────────────────────────────────────────
    let gameWidth = 360;
    let gameHeight = 500;
    let scale = 1;

    function resizeCanvas() {
      const maxW = window.innerWidth * 0.96;
      const maxH = window.innerHeight * 0.84;
      if (maxW / maxH > gameWidth / gameHeight) {
        scale = maxH / gameHeight;
      } else {
        scale = maxW / gameWidth;
      }
      canvas.style.width  = (gameWidth  * scale) + "px";
      canvas.style.height = (gameHeight * scale) + "px";
      canvas.width  = gameWidth  * scale * window.devicePixelRatio;
      canvas.height = gameHeight * scale * window.devicePixelRatio;
      ctx.scale(scale * window.devicePixelRatio, scale * window.devicePixelRatio);
    }
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', resizeCanvas);
    resizeCanvas();

    // ── GAME VARIABLES ─────────────────────────────────────────────────
    let playerX = 120, playerY = 250, velocity = 0;
    let gravity = 0.50, lift = -11.0;           // ← ĐÃ GIẢM ĐỘ NẢY Ở ĐÂY
    let running = false, gameOverFlag = false;

    let score = 0;
    let obstacles = [];
    let obstacleSpeed = 2.2;
    let gapSize = 245;

    let spawnRate = 2400;
    let difficultyLevel = 0;
    let lastDifficultyTime = 0;
    let lastSpawnTime = 0;

    let particles = [];
    let cloudX = 0, groundX = 0;

    let musicTimeout = null;

    // ── BACKGROUND MUSIC & SOUND EFFECTS ───────────────────────────────
    // (giữ nguyên như cũ, không thay đổi)
    function playBackgroundMusic() { /* ... */ }
    function stopBackgroundMusic() { /* ... */ }
    function playFlap() { /* ... */ }
    function playScore() { /* ... */ }
    function playHit() { /* ... */ }
    function playDie() { /* ... */ }
    function playLevelUp() { /* ... */ }

    // ── DRAW & LOGIC FUNCTIONS (giữ nguyên) ────────────────────────────
    function drawBackground() { /* ... */ }
    function drawBird() { /* ... */ }
    function spawnParticle() { /* ... */ }
    function drawParticles() { /* ... */ }
    function drawObstacles() { /* ... */ }
    function checkCollision() { /* ... */ }
    function updateScore() { /* ... */ }
    function spawnObstacle() { /* ... */ }

    // ── GAME LOOP ──────────────────────────────────────────────────────
    function update() {
      ctx.clearRect(0, 0, gameWidth, gameHeight);
      drawBackground();
      drawObstacles();
      drawParticles();

      if (running) {
        velocity += gravity;
        playerY += velocity;

        if (playerY < 25) { playerY = 25; velocity = 0; }
        if (playerY > gameHeight - 25) { playerY = gameHeight - 25; velocity = 0; }

        if (Date.now() - lastSpawnTime > spawnRate) { spawnObstacle(); lastSpawnTime = Date.now(); }
        if (Date.now() - lastDifficultyTime > 10000) {
          difficultyLevel++;
          obstacleSpeed += 0.22;
          spawnRate = Math.max(1350, spawnRate - 160);
          gapSize = Math.max(155, gapSize - 9);
          lastDifficultyTime = Date.now();
          playLevelUp();
        }

        spawnParticle();
        drawBird();
        checkCollision();
        updateScore();

        ctx.fillStyle = "white"; ctx.font = "bold 18px Arial";
        ctx.fillText("Level " + difficultyLevel, 10, 35);

        obstacles = obstacles.filter(o => o.x > -90);
        requestAnimationFrame(update);
      } else if (gameOverFlag) {
        stopBackgroundMusic();
        drawBird();
        ctx.fillStyle = "rgba(0,0,0,0.65)"; ctx.fillRect(0,0,gameWidth,gameHeight);
        ctx.fillStyle = "white";
        ctx.font = "bold 34px Arial"; ctx.fillText("GAME OVER", 48, 190);
        ctx.font = "22px Arial";
        ctx.fillText("Điểm: " + score, 125, 235);
        ctx.fillText("Level cuối: " + difficultyLevel, 105, 265);
        ctx.fillText("Chạm để chơi lại", 55, 300);
      } else {
        drawBird();
      }
    }

    // ── START / CONTROLS ───────────────────────────────────────────────
    function startGame() { /* ... */ }   // (giữ nguyên)

    canvas.addEventListener("touchstart", e => { e.preventDefault();
      if (!running && gameOverFlag) { startGame(); return; }
      if (running) { velocity = lift; playFlap(); }
    });
    canvas.addEventListener("mousedown", () => {
      if (!running && gameOverFlag) { startGame(); return; }
      if (running) { velocity = lift; playFlap(); }
    });

    startGame();
  </script>
</body>
</html>
