<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Photobooth Kiosk PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
color:white;
text-align:center;
}

#topbar{
background:#111;
padding:10px;
font-size:24px;
font-weight:bold;
}

#cameraBox{
position:relative;
display:inline-block;
margin-top:10px;
}

video{
width:520px;
border-radius:15px;
border:6px solid white;
}

#count{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
font-weight:bold;
color:#00ffd5;
}

#flash{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

.controls{
margin-top:10px;
}

button{
padding:14px 28px;
font-size:20px;
border:none;
border-radius:12px;
margin:5px;
cursor:pointer;
background:#ff3d6e;
color:white;
}

button:hover{
background:#ff0044;
}

select{
padding:8px;
font-size:16px;
margin:4px;
}

#result{
margin-top:20px;
background:white;
padding:15px;
display:inline-block;
border-radius:10px;
}

canvas{
background:white;
}

#qr{
margin-top:20px;
}

</style>
</head>

<body>

<div id="topbar">
📸 PHOTObooth KIOSK PRO
</div>

<div id="cameraBox">

<video id="video" autoplay></video>

<div id="count"></div>

<div id="flash"></div>

</div>

<div class="controls">

<select id="frame">
<option value="white">Khung trắng</option>
<option value="pink">Khung hồng</option>
<option value="black">Khung đen</option>
<option value="yellow">Khung vàng</option>
</select>

<select id="filter">
<option value="none">Không filter</option>
<option value="grayscale(1)">Đen trắng</option>
<option value="sepia(1)">Vintage</option>
<option value="contrast(150%)">Tương phản</option>
<option value="brightness(120%)">Sáng</option>
</select>

<br>

<button onclick="startShoot()">📸 BẮT ĐẦU CHỤP</button>

<button onclick="enterFullscreen()">🖥 KIOSK</button>

</div>

<div id="result">
<canvas id="canvas"></canvas>
</div>

<br>

<button onclick="download()">💾 TẢI ẢNH</button>

<div id="qr"></div>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
const count=document.getElementById("count")
const flash=document.getElementById("flash")

let photos=[]

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream
})

async function startShoot(){

photos=[]

for(let i=0;i<4;i++){

await countdown()

takePhoto()

await sleep(500)

}

makeStrip()

uploadAndQR()

}

function takePhoto(){

flash.style.opacity=1

setTimeout(()=>flash.style.opacity=0,150)

let temp=document.createElement("canvas")

temp.width=400
temp.height=300

let t=temp.getContext("2d")

let filter=document.getElementById("filter").value

t.filter=filter

t.drawImage(video,0,0,400,300)

photos.push(temp)

}

function makeStrip(){

let frame=document.getElementById("frame").value

let w=420
let h=photos.length*310+40

canvas.width=w
canvas.height=h

let color="white"

if(frame=="pink") color="#ffc0cb"
if(frame=="black") color="#000"
if(frame=="yellow") color="#ffe066"

ctx.fillStyle=color
ctx.fillRect(0,0,w,h)

for(let i=0;i<photos.length;i++){

ctx.drawImage(photos[i],10,10+i*310,400,300)

}

}

function countdown(){

return new Promise(resolve=>{

let t=3

count.innerText=t

let timer=setInterval(()=>{

t--

if(t<=0){

clearInterval(timer)

count.innerText="📸"

setTimeout(()=>{
count.innerText=""
resolve()
},300)

}else{

count.innerText=t

}

},1000)

})

}

function sleep(ms){
return new Promise(r=>setTimeout(r,ms))
}

function download(){

let link=document.createElement("a")

link.download="photobooth.png"

link.href=canvas.toDataURL()

link.click()

}

async function uploadAndQR(){

let base64=canvas.toDataURL("image/png").split(",")[1]

let form=new FormData()

form.append("image",base64)

/* THAY API KEY Ở ĐÂY */
form.append("key","YOUR_IMGBB_API_KEY")

let res=await fetch("https://api.imgbb.com/1/upload",{
method:"POST",
body:form
})

let data=await res.json()

let url=data.data.url

document.getElementById("qr").innerHTML=""

new QRCode(document.getElementById("qr"),{
text:url,
width:200,
height:200
})

}

function enterFullscreen(){

document.documentElement.requestFullscreen()

}

</script>

</body>
</html>
