<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flappy Rock ULTRA ADDICTIVE</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    background: radial-gradient(circle at top, #2d0b00 0%, #120000 45%, #000 100%);
    font-family: Arial, sans-serif;
    text-align:center;
    overflow:hidden;
    color:white;
    user-select:none;
    touch-action:manipulation;
  }
  h2{
    margin:12px 0 8px;
    font-size:2.2em;
    letter-spacing:.5px;
    text-shadow:0 0 12px #ff6a00, 0 0 36px rgba(255,100,0,.65);
  }
  canvas{
    border:4px solid rgba(255,255,255,.92);
    border-radius:18px;
    box-shadow:0 0 30px rgba(255,80,0,.35),0 0 70px rgba(255,80,0,.22),inset 0 0 20px rgba(255,255,255,.08);
    background:#000;
  }
  .hint{
    font-size:13px;
    opacity:.76;
    margin-top:8px;

</style>
</head>
<body>
<h2>🪨 FLAPPY ROCK ADDICTIVE 🌋</h2>
<canvas id="game" width="360" height="520"></canvas>
<div class="hint">Chạm để bay • Combo • Fever Mode • Revive 1 lần • Daily streak • Mystery Box • P để tạm dừng</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeGame(){
  const ratio = 360/520;
  let w = window.innerWidth * 0.95;
  let h = w / ratio;
  if(h > window.innerHeight * 0.82){ h = window.innerHeight * 0.82; w = h * ratio; }
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
}
window.addEventListener("resize", resizeGame);
resizeGame();

function getCanvasPoint(e){
  const rect = canvas.getBoundingClientRect();
  return {
    x:(e.clientX - rect.left) * (canvas.width / rect.width),
    y:(e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = AudioCtx ? new AudioCtx() : null;
let soundEnabled = JSON.parse(localStorage.getItem("fr_sound") ?? "true");
function beep(type="sine", freq=800, duration=0.12, vol=0.2, rampTo=300){
  if(!audioCtx || !soundEnabled) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(Math.max(40, rampTo), audioCtx.currentTime + duration);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
const sfx = {
  flap(){beep("sine",1200,0.11,0.24,350);},
  pass(){beep("triangle",950,0.08,0.16,1400);},
  perfect(){beep("square",1200,0.10,0.14,1800);},
  coin(){beep("triangle",1500,0.09,0.16,2200);},
  menu(){beep("sine",700,0.06,0.12,1200);},
  power(){beep("square",1800,0.13,0.18,900);},
  shield(){beep("triangle",700,0.22,0.16,1800);},
  slow(){beep("sawtooth",450,0.16,0.14,220);},
  fever(){beep("square",2200,0.16,0.2,1200);},
  box(){beep("triangle",1300,0.18,0.16,700);},
  revive(){beep("sine",600,0.25,0.18,1800);},
  tick(n){beep("square",500+n*200,0.08,0.12,600+n*250);},
  fail(){
    if(!audioCtx || !soundEnabled) return;
    const noise = audioCtx.createBufferSource();
    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.55, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<buffer.length;i++) data[i] = Math.random()*2-1;
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 850;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.65, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.55);
    noise.connect(filter).connect(gain).connect(audioCtx.destination);
    noise.start();
  }
};

let best = parseInt(localStorage.getItem("fr_best")) || 0;
let coins = parseInt(localStorage.getItem("fr_coins")) || 0;
let skin = localStorage.getItem("fr_skin") || "normal";
let unlockedSkins = JSON.parse(localStorage.getItem("fr_skins")) || ["normal"];
let leaderboard = JSON.parse(localStorage.getItem("fr_leaderboard")) || [];
let streakData = JSON.parse(localStorage.getItem("fr_streak")) || {lastDay:"", count:0, claimedToday:false};
let boxState = JSON.parse(localStorage.getItem("fr_box")) || {fill:0, ready:false};
let missions = JSON.parse(localStorage.getItem("fr_mission")) || {dayKey:"", target:15, reward:20, progress:0, claimed:false};

function dayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}
function saveAll(){
  localStorage.setItem("fr_best", best);
  localStorage.setItem("fr_coins", coins);
  localStorage.setItem("fr_skin", skin);
  localStorage.setItem("fr_skins", JSON.stringify(unlockedSkins));
  localStorage.setItem("fr_leaderboard", JSON.stringify(leaderboard));
  localStorage.setItem("fr_streak", JSON.stringify(streakData));
  localStorage.setItem("fr_box", JSON.stringify(boxState));
  localStorage.setItem("fr_mission", JSON.stringify(missions));
  localStorage.setItem("fr_sound", JSON.stringify(soundEnabled));
}
function refreshMission(){
  const k = dayKey();
  if(missions.dayKey !== k){
    const targets = [12,15,18,22,25];
    const rewards = [15,20,25,30,40];
    const i = Math.floor(Math.random()*targets.length);
    missions = {dayKey:k, target:targets[i], reward:rewards[i], progress:0, claimed:false};
  }
}
function refreshStreak(){
  const k = dayKey();
  if(streakData.lastDay !== k){
    const now = new Date(k);
    const prev = streakData.lastDay ? new Date(streakData.lastDay) : null;
    if(prev){
      const diff = Math.round((now - prev)/86400000);
      if(diff === 1) streakData.count += 1;
      else if(diff > 1) streakData.count = 1;
    }else streakData.count = 1;
    streakData.lastDay = k;
    streakData.claimedToday = false;
  }
}
refreshMission();
refreshStreak();
saveAll();

function pushLeaderboard(score){
  if(score <= 0) return;
  leaderboard.push(score);
  leaderboard.sort((a,b)=>b-a);
  leaderboard = leaderboard.slice(0,5);
}

let gameState = "menu";
let lastTime = 0;
let spawnTimer = 0;
let playerX = 110;
let playerY = 250;
let velocity = 0;
let rotation = 0;
const gravity = 0.50;
const lift = -8.15;
let score = 0;
let combo = 0;
let comboTimer = 0;
let feverMeter = 0;
let feverTime = 0;
let flashTimer = 0;
let shake = 0;
let distance = 0;
let nearMissChain = 0;
let achievementTimer = 0;
let achievementText = "";
let recentRewardText = "";
let rewardToastTimer = 0;
let reviveUsed = false;
let reviveOfferTimer = 0;
let pendingDeath = false;
let endlessPulse = 0;

let obstacles = [];
let particles = [];
let floatTexts = [];
let coinsOnMap = [];
let embers = [];
let stars = [];
let sparks = [];
let powerUps = [];
let rings = [];
let trails = [];

let groundX = 0;
let pauseBtn = {x:314,y:18,w:28,h:28};
let soundBtn = {x:278,y:18,w:28,h:28};
let currentGapSize = 205;
let currentObstacleSpeed = 2.7;
const SPAWN_INTERVAL_BASE = 1450;
let worldSpeedFactor = 1;
let countdownValue = 3;
let countdownTimer = 0;

let powerState = {shield:0, magnet:0, slow:0};

for(let i=0;i<52;i++) stars.push({x:Math.random()*360,y:Math.random()*270,r:Math.random()*1.8+.4,a:Math.random()*.8+.2,tw:Math.random()*.05+.01});
for(let i=0;i<22;i++) embers.push({x:Math.random()*360,y:360+Math.random()*160,vx:-.2-Math.random()*.7,vy:-.2-Math.random()*.6,s:2+Math.random()*4,hue:15+Math.random()*35,alpha:.2+Math.random()*.45});

function addFloatText(text,x,y,color="#fff",size=18){ floatTexts.push({text,x,y,vy:-0.7,life:50,color,size}); }
function spawnParticles(x,y,count,hue=25){
  for(let i=0;i<count;i++){
    const a = Math.random()*Math.PI*2;
    const sp = 1.2 + Math.random()*4.5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,life:28+Math.random()*28,size:2+Math.random()*4,hue,alpha:1});
  }
}
function spawnRing(x,y,color="#fff59d"){ rings.push({x,y,r:6,grow:2.8,life:24,color}); }
function spawnSparkTrail(x,y,count=8,color="#ffe082"){
  for(let i=0;i<count;i++) sparks.push({x,y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*2-1,life:18+Math.random()*16,size:1.5+Math.random()*2,color});
}
function spawnTrail(){ trails.push({x:playerX,y:playerY,life:18,r:20 + Math.random()*4,fever:feverTime>0}); }
function screenShake(v=8){ shake = Math.max(shake, v); }
function rectContains(r,x,y){ return x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h; }
function awardAchievement(text){ achievementText=text; achievementTimer=100; spawnRing(playerX,playerY,"#fff59d"); }
function rewardToast(text){ recentRewardText=text; rewardToastTimer=90; }
function vibrate(ms){ if(navigator.vibrate) navigator.vibrate(ms); }
function resumeAudio(){ if(audioCtx && audioCtx.state === "suspended") audioCtx.resume(); }

const skyGradient = ctx.createLinearGradient(0,0,0,520);
skyGradient.addColorStop(0,"#101b59");
skyGradient.addColorStop(.22,"#5a1b8b");
skyGradient.addColorStop(.5,"#ff5722");
skyGradient.addColorStop(.72,"#ff9800");
skyGradient.addColorStop(1,"#fff176");

let clouds = [
  {x:50,y:72,size:1.15,speed:.32},
  {x:220,y:52,size:.96,speed:.38},
  {x:330,y:100,size:1.28,speed:.25},
  {x:470,y:80,size:1.08,speed:.34}
];

function drawBackground(delta){
  ctx.fillStyle = skyGradient;
  ctx.fillRect(0,0,360,520);
  for(const s of stars){
    s.a += s.tw * delta;
    if(s.a>1 || s.a<.15) s.tw *= -1;
    ctx.globalAlpha = s.a;
    ctx.fillStyle = feverTime>0 ? "#fff59d" : "#fff";
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.save();
  ctx.shadowColor = feverTime>0 ? "#ffea00" : (powerState.slow>0 ? "#8be7ff" : "#ffe95e");
  ctx.shadowBlur = 50;
  ctx.fillStyle = feverTime>0 ? "#fff176" : (powerState.slow>0 ? "#b3e5fc" : "#ffd54f");
  ctx.beginPath(); ctx.arc(286,132,50 + Math.sin(endlessPulse)*3,0,Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.fillStyle = feverTime>0 ? "#6a1b9a" : "#4e2f91";
  ctx.beginPath(); ctx.moveTo(0,420); ctx.quadraticCurveTo(90,300,190,405); ctx.quadraticCurveTo(280,320,360,390); ctx.lineTo(360,440); ctx.lineTo(0,440); ctx.fill();
  ctx.fillStyle = feverTime>0 ? "#ab47bc" : "#7751c5";
  ctx.beginPath(); ctx.moveTo(-30,430); ctx.quadraticCurveTo(70,340,180,402); ctx.quadraticCurveTo(265,330,400,384); ctx.lineTo(360,440); ctx.lineTo(0,440); ctx.fill();

  ctx.fillStyle = "rgba(255,245,245,0.92)";
  clouds.forEach(c=>{
    ctx.beginPath(); ctx.ellipse(c.x,c.y,45*c.size,28*c.size,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+28*c.size,c.y-12*c.size,32*c.size,25*c.size,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x-25*c.size,c.y-10*c.size,30*c.size,22*c.size,0,0,Math.PI*2); ctx.fill();
    c.x -= c.speed * delta;
    if(c.x < -150) c.x = 510;
  });

  ctx.fillStyle = feverTime>0 ? "#402400" : (powerState.slow>0 ? "#1b3d4d" : "#4e342e");
  ctx.fillRect(groundX,440,720,80);
  ctx.fillStyle = feverTime>0 ? "#ffca28" : (powerState.slow>0 ? "#5ad1ff" : "#388e3c");
  ctx.fillRect(groundX,430,720,18);

  ctx.strokeStyle = feverTime>0 ? "#fff176" : (powerState.slow>0 ? "#a5ecff" : "#2e7d32");
  ctx.lineWidth = 3;
  for(let i=0;i<400;i+=18){
    let gx = (groundX + i) % 720;
    if(gx < 0) gx += 720;
    ctx.beginPath(); ctx.moveTo(gx+6,440); ctx.lineTo(gx-6,410); ctx.stroke();
    if(i % 60 === 0){ ctx.fillStyle = "#616161"; ctx.beginPath(); ctx.arc(gx+12,435,8,0,Math.PI*2); ctx.fill(); }
  }

  for(const e of embers){
    e.x += e.vx * delta; e.y += e.vy * delta;
    if(e.x < -10 || e.y < 300){ e.x = 370 + Math.random()*30; e.y = 445 + Math.random()*80; e.alpha = .25 + Math.random()*.45; }
    ctx.globalAlpha = e.alpha;
    ctx.fillStyle = feverTime>0 ? "#fff176" : (powerState.slow>0 ? "#8be7ff" : `hsl(${e.hue},100%,55%)`);
    ctx.beginPath(); ctx.arc(e.x,e.y,e.s,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  groundX -= 3.1 * delta * worldSpeedFactor;
  if(groundX <= -360) groundX = 0;
}

function drawPillar(x, topY, height, isTop){
  const grad = ctx.createLinearGradient(x, topY, x+68, topY+height);
  if(feverTime>0){
    grad.addColorStop(0,"#ffd54f"); grad.addColorStop(.35,"#ff9800"); grad.addColorStop(.65,"#ff5722"); grad.addColorStop(1,"#6d1b00");
  }else if(powerState.slow>0){
    grad.addColorStop(0,"#7de3ff"); grad.addColorStop(.35,"#c2f4ff"); grad.addColorStop(.65,"#3fa6d8"); grad.addColorStop(1,"#114c6c");
  }else{
    grad.addColorStop(0,isTop?"#ff5a1f":"#8b0000"); grad.addColorStop(.35,"#ff9800"); grad.addColorStop(.65,"#b22222"); grad.addColorStop(1,"#3a0000");
  }
  ctx.fillStyle = grad;
  ctx.fillRect(x,topY,68,height);
  ctx.strokeStyle = "rgba(0,0,0,.42)";
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(x+16, topY+12); ctx.lineTo(x+39, topY+height-35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+52, topY+28); ctx.lineTo(x+19, topY+height-52); ctx.stroke();
  ctx.shadowColor = feverTime>0 ? "#ffea00" : (powerState.slow>0 ? "#9beeff" : "#ff4b00");
  ctx.shadowBlur = 28;
  ctx.fillStyle = feverTime>0 ? "rgba(255,235,120,0.72)" : (powerState.slow>0 ? "rgba(180,240,255,0.75)" : "rgba(255,120,0,0.65)");
  ctx.fillRect(x+10, topY+6, 48, Math.max(20,height-15));
  ctx.shadowBlur = 0;
  if(isTop){
    ctx.shadowColor = feverTime>0 ? "#fff176" : (powerState.slow>0 ? "#c8f6ff" : "#ffee00");
    ctx.shadowBlur = 40;
    ctx.fillStyle = feverTime>0 ? "#ffca28" : (powerState.slow>0 ? "#86e0ff" : "#ff4500");
    ctx.beginPath(); ctx.moveTo(x+5, topY+3); ctx.lineTo(x+34, topY-52); ctx.lineTo(x+61, topY+3); ctx.fill();
    ctx.fillStyle = feverTime>0 ? "#fff59d" : (powerState.slow>0 ? "#f1feff" : "#ffea00");
    ctx.beginPath(); ctx.moveTo(x+16, topY-12); ctx.lineTo(x+34, topY-65); ctx.lineTo(x+50, topY-12); ctx.fill();
    ctx.shadowBlur = 0;
  }else{
    ctx.shadowColor = feverTime>0 ? "#fff176" : (powerState.slow>0 ? "#8be7ff" : "#ff6600");
    ctx.shadowBlur = 22;
    ctx.fillStyle = feverTime>0 ? "rgba(255,236,120,.55)" : (powerState.slow>0 ? "rgba(160,240,255,.55)" : "rgba(255,160,0,.55)");
    ctx.beginPath(); ctx.moveTo(x+4, topY+height-3); ctx.lineTo(x+34, topY+height+26); ctx.lineTo(x+64, topY+height-3); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function spawnObstacle(){
  const safeMin = 150, safeMax = 330;
  const gapY = safeMin + Math.random()*(safeMax-safeMin);
  obstacles.push({x:360,gapY,width:68,scored:false,closeCallDone:false});
  if(Math.random() < .76){
    coinsOnMap.push({x:394,y:gapY + (Math.random()*70-35),r:10,taken:false,spin:Math.random()*Math.PI*2});
  }
  if(score >= 6 && Math.random() < .18){
    const types = ["shield","magnet","slow"];
    powerUps.push({x:410,y:gapY + (Math.random()*80-40),r:13,type:types[Math.floor(Math.random()*types.length)],spin:0,taken:false});
  }
  spawnParticles(360,gapY,4,18);
}

function spawnBox(){
  if(!boxState.ready) return;
  powerUps.push({x:410,y:110 + Math.random()*250,r:15,type:"box",spin:0,taken:false});
  boxState.ready = false;
  boxState.fill = 0;
  saveAll();
}

function drawObstacles(delta){
  for(const o of obstacles){
    o.x -= currentObstacleSpeed * delta * worldSpeedFactor;
    const upperHeight = o.gapY - currentGapSize/2 + 20;
    drawPillar(o.x,0,upperHeight,true);
    const lowerY = o.gapY + currentGapSize/2 - 20;
    drawPillar(o.x,lowerY,520-lowerY+30,false);
  }
}

function drawCoins(delta){
  for(const c of coinsOnMap){
    if(c.taken) continue;
    c.x -= currentObstacleSpeed * delta * worldSpeedFactor;
    c.spin += .18 * delta;
    if(powerState.magnet > 0){
      const dx = playerX - c.x, dy = playerY - c.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if(d < 95){ c.x += dx*.06*delta; c.y += dy*.06*delta; spawnSparkTrail(c.x,c.y,1,"#fff59d"); }
    }
    ctx.save();
    ctx.translate(c.x,c.y);
    ctx.scale(.9 + Math.abs(Math.sin(c.spin))*.25,1);
    ctx.shadowColor = "#ffd700"; ctx.shadowBlur = 18;
    ctx.fillStyle = "#ffd54f"; ctx.beginPath(); ctx.arc(0,0,c.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.lineWidth = 2; ctx.strokeStyle = "#ff9800"; ctx.stroke();
    ctx.fillStyle = "#fff8c4"; ctx.beginPath(); ctx.arc(-3,-3,2.2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawPowerUps(delta){
  for(const p of powerUps){
    if(p.taken) continue;
    p.x -= currentObstacleSpeed * delta * worldSpeedFactor;
    p.spin += .14 * delta;
    let color="#fff", text="?";
    if(p.type === "shield"){ color="#81d4fa"; text="S"; }
    if(p.type === "magnet"){ color="#fff176"; text="M"; }
    if(p.type === "slow"){ color="#b39ddb"; text="T"; }
    if(p.type === "box"){ color="#ffcc80"; text="?"; }
    ctx.save();
    ctx.translate(p.x,p.y); ctx.rotate(p.spin);
    ctx.shadowColor = color; ctx.shadowBlur = 20;
    ctx.fillStyle = color; ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0; ctx.fillStyle = "#222"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center"; ctx.fillText(text,0,5);
    ctx.restore();
  }
  ctx.textAlign = "left";
}

function drawShieldAura(){
  if(powerState.shield <= 0) return;
  ctx.save();
  ctx.translate(playerX,playerY);
  ctx.strokeStyle = `rgba(129,212,250,${.35 + .25*Math.sin(performance.now()/120)})`;
  ctx.lineWidth = 4;
  ctx.shadowColor = "#81d4fa";
  ctx.shadowBlur = 18;
  ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function drawRock(){
  drawShieldAura();
  ctx.save();
  ctx.translate(playerX,playerY);
  ctx.rotate(rotation);
  let grad;
  switch(skin){
    case "gold": grad = ctx.createRadialGradient(-10,-10,4,12,12,26); grad.addColorStop(0,"#ffefb0"); grad.addColorStop(.5,"#ffcc33"); grad.addColorStop(1,"#cc8800"); ctx.shadowColor="#ffee77"; ctx.shadowBlur=24; break;
    case "diamond": grad = ctx.createRadialGradient(-12,-12,3,14,14,29); grad.addColorStop(0,"#f0ffff"); grad.addColorStop(.45,"#a0e0ff"); grad.addColorStop(1,"#2080ff"); ctx.shadowColor="#80ffff"; ctx.shadowBlur=26; break;
    case "fire": grad = ctx.createRadialGradient(-9,-9,5,11,11,27); grad.addColorStop(0,"#ffee44"); grad.addColorStop(.35,"#ff5500"); grad.addColorStop(1,"#aa0000"); ctx.shadowColor="#ff3300"; ctx.shadowBlur=32; break;
    case "ice": grad = ctx.createRadialGradient(-11,-11,4,13,13,28); grad.addColorStop(0,"#f0fbff"); grad.addColorStop(.55,"#81d4fa"); grad.addColorStop(1,"#0277bd"); ctx.shadowColor="#80e0ff"; ctx.shadowBlur=24; break;
    default: grad = ctx.createRadialGradient(-8,-8,5,10,10,25); grad.addColorStop(0,"#f0d0a0"); grad.addColorStop(1,"#8b5a2b");
  }
  ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = "rgba(60,30,10,0.5)"; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(-13,8); ctx.quadraticCurveTo(-4,13,12,-6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,-11); ctx.quadraticCurveTo(4,5,-11,10); ctx.stroke();
  ctx.fillStyle = "rgba(255,255,255,0.78)"; ctx.beginPath(); ctx.arc(-9,-9,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = "#111"; ctx.beginPath(); ctx.ellipse(7,-5,5.5,7,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(-5,-4,5,6.5,0,0,Math.PI*2); ctx.fill();

function drawParticles(delta){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i]; p.x += p.vx*delta; p.y += p.vy*delta; p.vy += .15*delta; p.life -= delta; p.alpha = p.life/45;
    ctx.save(); ctx.globalAlpha = Math.max(0,p.alpha); ctx.fillStyle = `hsl(${p.hue},100%,55%)`; ctx.fillRect(p.x,p.y,p.size,p.size); ctx.restore();
    if(p.life <= 0) particles.splice(i,1);
  }
}
function drawFloatTexts(delta){
  for(let i=floatTexts.length-1;i>=0;i--){
    const f=floatTexts[i]; f.y += f.vy*delta; f.life -= delta;
    ctx.save(); ctx.globalAlpha = Math.max(0,f.life/50); ctx.fillStyle=f.color; ctx.font=`bold ${f.size}px Arial`; ctx.textAlign="center"; ctx.fillText(f.text,f.x,f.y); ctx.restore();

}
function drawSparks(delta){
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i]; s.x += s.vx*delta; s.y += s.vy*delta; s.vy += .05*delta; s.life -= delta;
    ctx.save(); ctx.globalAlpha = Math.max(0,s.life/30); ctx.fillStyle=s.color; ctx.fillRect(s.x,s.y,s.size,s.size); ctx.restore();

}
function drawRings(delta){

    ctx.save(); ctx.globalAlpha = Math.max(0,r.life/24); ctx.strokeStyle=r.color; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2); ctx.stroke(); ctx.restore();
    if(r.life <= 0) rings.splice(i,1);

}
function drawTrails(delta){
  for(let i=trails.length-1;i>=0;i--){

}

function getDifficulty(){
  const level = Math.min(24, Math.floor(score/3));
  currentObstacleSpeed = 2.7 + level*.12 + (feverTime>0 ? .28 : 0);
  currentGapSize = Math.max(142, 205 - level*3 + (feverTime>0 ? 10 : 0));
  worldSpeedFactor = powerState.slow>0 ? .62 : (feverTime>0 ? 1.15 : 1);
}

function addFever(amount){
  if(feverTime > 0) return;
  feverMeter = Math.min(100, feverMeter + amount);
  if(feverMeter >= 100){
    feverMeter = 100;
    feverTime = 420;
    sfx.fever();
    rewardToast("🔥 FEVER MODE ACTIVATED");
    awardAchievement("🔥 FEVER MODE");
    spawnParticles(playerX, playerY, 28, 52);
    screenShake(8);
  }
}

function updateScoreAndCombo(){
  for(const o of obstacles){
    if(!o.scored && o.x + o.width < playerX){
      o.scored = true;
      const dist = Math.abs(playerY - o.gapY);
      const perfect = dist < 22;
      let gain = 1;
      if(perfect){
        combo++; comboTimer = 50; gain = combo >= 3 ? 2 : 1;
        addFloatText("PERFECT!",playerX+20,playerY-22,"#fff59d",20);
        spawnParticles(playerX+14,playerY,12,50); spawnRing(playerX,playerY,"#fff59d"); sfx.perfect(); addFever(20);
        if(combo === 5) awardAchievement("🔥 PERFECT STREAK x5");
      }else{
        combo = 0; comboTimer = 0; sfx.pass(); addFever(10);
      }
      if(feverTime > 0) gain += 1;
      score += gain;
      coins += feverTime>0 ? 2 : 1;
      boxState.fill = Math.min(8, boxState.fill + 1);
      if(boxState.fill >= 8 && !boxState.ready){
        boxState.ready = true;
        rewardToast("🎁 MYSTERY BOX READY");
        awardAchievement("🎁 BOX READY");
      }
      missions.progress = Math.max(missions.progress, score);
      if(!missions.claimed && missions.progress >= missions.target){
        missions.claimed = true; coins += missions.reward; addFloatText(`+${missions.reward} MISSION`,180,120,"#fff59d",24); rewardToast(`✅ +${missions.reward} coins nhiệm vụ ngày`); awardAchievement("✅ Hoàn thành mission ngày"); sfx.power();
      }
      saveAll();
    }
  }
}

}

  const rewards = [
    {kind:"coins", value:15, text:"🎁 +15 coins"},
    {kind:"coins", value:25, text:"🎁 +25 coins"},
    {kind:"coins", value:40, text:"🎁 +40 coins"},
    {kind:"shield", value:360, text:"🛡️ Free Shield"},

    {kind:"fever", value:55, text:"🔥 Fever Boost"}

  const reward = rewards[Math.floor(Math.random()*rewards.length)];

  rewardToast(reward.text);
  addFloatText(reward.text,180,140,"#fff59d",22);
  spawnParticles(playerX,playerY,24,48);
  sfx.box();

function updateNearMiss(){
  for(const o of obstacles){
    if(o.closeCallDone) continue;
    const inGateX = playerX + 18 > o.x && playerX - 18 < o.x + o.width;
    if(!inGateX) continue;
    const topEdge = o.gapY - currentGapSize/2;
    const bottomEdge = o.gapY + currentGapSize/2;
    const nearTop = Math.abs((playerY - 20) - topEdge) < 11;
    const nearBottom = Math.abs((playerY + 20) - bottomEdge) < 11;
    if(nearTop || nearBottom){
      o.closeCallDone = true; nearMissChain++; coins += 2; addFloatText("NEAR MISS +2",playerX+10,playerY-26,"#ffcc80",18); spawnSparkTrail(playerX,playerY,10,"#ffcc80"); addFever(14);
      if(nearMissChain === 3) awardAchievement("⚡ Near-miss master"); saveAll();
    }
  }
}

  gameState = "revive";

function checkCollision(){
  if(playerY < 20 || playerY > 480){
    if(powerState.shield > 0){ consumeShield(); playerY = Math.max(24, Math.min(476, playerY)); velocity *= -.2; return; }
    triggerReviveOffer(); return;
  }
  for(const o of obstacles){
    if(playerX + 20 > o.x && playerX - 20 < o.x + o.width){
      if(playerY < o.gapY - currentGapSize/2 + 10 || playerY > o.gapY + currentGapSize/2 - 10){
        if(powerState.shield > 0){ consumeShield(); if(playerY < o.gapY) playerY = o.gapY - currentGapSize/2 + 26; else playerY = o.gapY + currentGapSize/2 - 26; velocity = 0; return; }
        triggerReviveOffer(); return;
      }
    }
  }
}

function cleanupObjects(){
  for(let i=obstacles.length-1;i>=0;i--) if(obstacles[i].x < -120) obstacles.splice(i,1);
  for(let i=coinsOnMap.length-1;i>=0;i--) if(coinsOnMap[i].x < -50 || coinsOnMap[i].taken) coinsOnMap.splice(i,1);
  for(let i=powerUps.length-1;i>=0;i--) if(powerUps[i].x < -50 || powerUps[i].taken) powerUps.splice(i,1);
}

function tickStates(delta){
  if(powerState.shield>0) powerState.shield = Math.max(0, powerState.shield - delta);
  if(powerState.magnet>0) powerState.magnet = Math.max(0, powerState.magnet - delta);
  if(powerState.slow>0) powerState.slow = Math.max(0, powerState.slow - delta);
  if(feverTime>0){ feverTime = Math.max(0, feverTime - delta); if(feverTime === 0) feverMeter = 0; }
  if(achievementTimer>0) achievementTimer -= delta;
  if(rewardToastTimer>0) rewardToastTimer -= delta;
}

function revivePlayer(){
  coins -= 30;
  reviveUsed = true;
  powerState.shield = 180;
  velocity = 0;
  playerY = 250;
  obstacles = obstacles.filter(o => o.x < 10 || o.x > 190);
  coinsOnMap = coinsOnMap.filter(c => c.x < 10 || c.x > 190);
  powerUps = powerUps.filter(p => p.x < 10 || p.x > 190);
  spawnParticles(playerX,playerY,30,180);
  rewardToast("💖 Revive thành công");
  sfx.revive();
  gameState = "game";
  saveAll();
}

function finalizeGameOver(){
  sfx.fail(); vibrate(120); spawnParticles(playerX,playerY,52,skin==="fire"?15:30); addFloatText("BOOM!",playerX,playerY-10,"#ff8a65",22); screenShake(14); flashTimer=8; combo=0;
  if(score > best) best = score;
  pushLeaderboard(score);
  saveAll();
  gameState = "gameover";
}

function claimDailyStreakReward(){
  if(streakData.claimedToday) return;
  const reward = Math.min(100, 10 + streakData.count * 5);
  coins += reward;
  streakData.claimedToday = true;
  rewardToast(`📅 Daily streak +${reward} coins`);
  addFloatText(`+${reward} STREAK`,180,150,"#fff59d",24);
  saveAll();
}

function startGame(){
  refreshMission(); refreshStreak(); if(!streakData.claimedToday) claimDailyStreakReward();
  score=0; combo=0; comboTimer=0; feverMeter=0; feverTime=0; velocity=0; playerY=250; rotation=0; distance=0; spawnTimer=0; currentGapSize=205; currentObstacleSpeed=2.7;
  obstacles=[]; particles=[]; floatTexts=[]; coinsOnMap=[]; sparks=[]; powerUps=[]; rings=[]; trails=[]; flashTimer=0; shake=0; nearMissChain=0; powerState={shield:0,magnet:0,slow:0}; countdownValue=3; countdownTimer=60; reviveUsed=false;
  if(boxState.ready) spawnBox();
  gameState="starting";
}

function handlePointer(x,y){
  resumeAudio();
  if(gameState === "menu"){
    if(x>=95 && x<=265 && y>=178 && y<=222){ sfx.menu(); startGame(); return; }
    if(x>=95 && x<=265 && y>=230 && y<=274){ sfx.menu(); gameState="shop"; return; }
    if(x>=95 && x<=265 && y>=282 && y<=320){ soundEnabled=!soundEnabled; saveAll(); sfx.menu(); return; }
  }
  if(gameState === "shop"){
    if(x>=18 && x<=88 && y>=18 && y<=52){ sfx.menu(); gameState="menu"; return; }
    shopItems.forEach((s,i)=>{
      const ry=120+i*68;
      if(x>=28 && x<=332 && y>=ry && y<=ry+54){
        if(unlockedSkins.includes(s.k)){ skin=s.k; saveAll(); sfx.menu(); addFloatText("Đã chọn",180,ry+16,"#9fe3ff",18); }
        else if(coins >= s.c){ coins -= s.c; unlockedSkins.push(s.k); skin=s.k; saveAll(); sfx.coin(); addFloatText("Mở khóa!",180,ry+16,"#fff59d",18); }
        else { beep("sawtooth",220,0.12,0.12,100); addFloatText("Thiếu coin",180,ry+16,"#ff8a80",18); }
      }
    });
    return;
  }
  if(gameState === "starting") return;
  if(gameState === "game"){
    if(rectContains({x:soundBtn.x-4,y:soundBtn.y-4,w:soundBtn.w+8,h:soundBtn.h+8},x,y)){ soundEnabled=!soundEnabled; saveAll(); return; }
    if(rectContains({x:pauseBtn.x-4,y:pauseBtn.y-4,w:pauseBtn.w+8,h:pauseBtn.h+8},x,y)){ sfx.menu(); gameState="pause"; return; }
    velocity = lift; sfx.flap(); spawnParticles(playerX-10,playerY+8,4,skin==="ice"?190:25); return;
  }
  if(gameState === "pause"){
    if(x>=95 && x<=265 && y>=230 && y<=276){ sfx.menu(); gameState="game"; return; }
    if(x>=95 && x<=265 && y>=288 && y<=334){ sfx.menu(); gameState="menu"; return; }
  }
  if(gameState === "revive"){
    if(x>=75 && x<=285 && y>=280 && y<=326){ revivePlayer(); return; }
    if(x>=95 && x<=265 && y>=340 && y<=382){ finalizeGameOver(); return; }
  }
  if(gameState === "gameover"){
    if(x>=95 && x<=265 && y>=340 && y<=386){ sfx.menu(); startGame(); return; }
    if(x>=95 && x<=265 && y>=398 && y<=444){ sfx.menu(); gameState="menu"; return; }
  }
}

canvas.addEventListener("pointerdown", e=>{ const p=getCanvasPoint(e); handlePointer(p.x,p.y); });
window.addEventListener("keydown", e=>{
  if(e.code === "KeyP"){ if(gameState === "game") gameState="pause"; else if(gameState === "pause") gameState="game"; }
  if(e.code === "KeyM"){ soundEnabled=!soundEnabled; saveAll(); }
  if(e.code === "Space"){
    e.preventDefault(); resumeAudio();
    if(gameState === "game"){ velocity = lift; sfx.flap(); spawnParticles(playerX-10,playerY+8,4,skin==="ice"?190:25); }
    else if(gameState === "menu"){ startGame(); }
  }
});

function update(now=0){
  if(!lastTime) lastTime = now;
  const delta = Math.min((now-lastTime)/16.67, 2);
  lastTime = now;
  endlessPulse += .04 * delta;
  ctx.clearRect(0,0,360,520);
  let sx=0, sy=0;
  if(shake>0){ sx=(Math.random()-.5)*shake; sy=(Math.random()-.5)*shake; shake*=.82; if(shake<.3) shake=0; }
  ctx.save(); ctx.translate(sx,sy);

  if(gameState === "menu") drawMenu();
  else if(gameState === "shop") drawShop();
  else if(gameState === "starting"){
    drawStarting();
    countdownTimer -= delta;
    if(countdownTimer <= 0){ sfx.tick(countdownValue); countdownValue--; countdownTimer = 60; if(countdownValue <= 0) gameState = "game"; }
  }
  else if(gameState === "game"){
    getDifficulty(); tickStates(delta); drawBackground(delta);
    velocity += gravity * delta; playerY += velocity * delta; distance += currentObstacleSpeed * delta * worldSpeedFactor; rotation = Math.min(Math.max(velocity*.052,-.85),1.25);
    spawnTrail();
    drawObstacles(delta); drawCoins(delta); drawPowerUps(delta); drawTrails(delta); drawRock(); drawParticles(delta); drawFloatTexts(delta); drawSparks(delta); drawRings(delta);
    checkCollision(); updateScoreAndCombo(); updateCoinsCollision(); updatePowerUpCollision(); updateNearMiss(); cleanupObjects();
    spawnTimer += 16.67 * delta;
    const currentSpawnInterval = Math.max(900, SPAWN_INTERVAL_BASE - score*10 - (feverTime>0 ? 120 : 0));
    if(spawnTimer > currentSpawnInterval){ spawnObstacle(); if(Math.random()<.08 && !boxState.ready) boxState.fill = Math.min(8, boxState.fill+1); spawnTimer=0; }
    if(comboTimer > 0) comboTimer -= delta;
    drawHUD();
  }
  else if(gameState === "pause") drawPause();
  else if(gameState === "revive"){
    drawReviveOffer();
    reviveOfferTimer -= delta;
    if(reviveOfferTimer <= 0) finalizeGameOver();
  }
  else if(gameState === "gameover") drawGameOver();

  if(flashTimer > 0){ ctx.fillStyle = `rgba(255,255,255,${flashTimer/18})`; ctx.fillRect(0,0,360,520); flashTimer -= delta; }
  ctx.restore();
  requestAnimationFrame(update);
}
requestAnimationFrame(update);
</script>
